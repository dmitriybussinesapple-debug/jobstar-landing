<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DesignPro — Become a Product Leader</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ["'Inter'", "system-ui", "sans-serif"],
        },
      },
    },
  };
</script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
<script>window.Motion = window.Motion || window.FramerMotion;</script>

<style>
  html, body { background: #000000; margin: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; }
  * { -webkit-font-smoothing: antialiased; }
</style>
</head>
<body class="bg-black">
  <div id="root"></div>

  <!-- ===== Icons (lucide-style) ===== -->
  <script type="text/babel">
    function ArrowRight({ className = "h-4 w-4" }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none"
             stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M5 12h14" />
          <path d="m12 5 7 7-7 7" />
        </svg>
      );
    }
    function Menu({ className = "h-6 w-6" }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none"
             stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <line x1="4" y1="6" x2="20" y2="6" />
          <line x1="4" y1="12" x2="20" y2="12" />
          <line x1="4" y1="18" x2="20" y2="18" />
        </svg>
      );
    }
    window.ArrowRight = ArrowRight;
    window.Menu = Menu;
  </script>

  <!-- ===== ShinyText (framer-motion sweeping gradient) ===== -->
  <script type="text/babel">
    function ShinyText({ text, className = "" }) {
      const { motion } = window.Motion;
      // Base color #64CEFB with a white shine band; 100deg spread; 3s continuous L→R sweep.
      const baseColor = "#64CEFB";
      const shineColor = "#ffffff";
      return (
        <motion.span
          className={className}
          style={{
            display: "inline-block",
            backgroundImage: `linear-gradient(100deg, ${baseColor} 0%, ${baseColor} 42%, ${shineColor} 50%, ${baseColor} 58%, ${baseColor} 100%)`,
            backgroundSize: "200% 100%",
            WebkitBackgroundClip: "text",
            backgroundClip: "text",
            color: "transparent",
            WebkitTextFillColor: "transparent",
          }}
          animate={{ backgroundPositionX: ["200%", "-200%"] }}
          transition={{ duration: 3, ease: "linear", repeat: Infinity }}
        >
          {text}
        </motion.span>
      );
    }
    window.ShinyText = ShinyText;
  </script>

  <!-- ===== Navbar ===== -->
  <script type="text/babel">
    function Navbar() {
      const { ArrowRight, Menu } = window;
      const [open, setOpen] = React.useState(false);
      const links = ["Home", "About Us", "Courses", "Instructors", "Testimonials", "Blog"];

      return (
        <header className="pt-6">
          <nav className="flex items-center justify-between">
            {/* Logo */}
            <a href="#" className="flex items-center gap-3 shrink-0">
              <span className="w-8 h-8 rounded-full border-2 border-white flex items-center justify-center">
                <span className="w-3 h-3 rounded-full bg-white"></span>
              </span>
              <span className="text-white font-semibold text-lg tracking-tight">DesignPro</span>
            </a>

            {/* Desktop links pill */}
            <div className="hidden lg:flex items-center gap-1 rounded-full border border-gray-700 px-2 py-1.5">
              {links.map((l) => (
                <a key={l} href="#"
                   className="px-3 py-1.5 text-sm text-white/80 hover:text-white transition-colors">
                  {l}
                </a>
              ))}
              <a href="#"
                 className="ml-1 flex items-center gap-1 px-3 py-1.5 text-sm text-white/80 hover:text-white transition-colors">
                Contact us
                <ArrowRight className="h-4 w-4" />
              </a>
            </div>

            {/* Mobile hamburger */}
            <button
              onClick={() => setOpen((v) => !v)}
              className="lg:hidden text-white/90 hover:text-white transition-colors"
              aria-label="Toggle menu">
              <Menu className="h-6 w-6" />
            </button>
          </nav>

          {/* Mobile menu */}
          {open && (
            <div className="lg:hidden mt-3 rounded-2xl border border-gray-700 p-2 flex flex-col">
              {[...links, "Contact us"].map((l) => (
                <a key={l} href="#"
                   className="px-3 py-2 text-sm text-white/80 hover:text-white transition-colors">
                  {l}
                </a>
              ))}
            </div>
          )}
        </header>
      );
    }
    window.Navbar = Navbar;
  </script>

  <!-- ===== Hero ===== -->
  <script type="text/babel">
    function Hero() {
      const { Navbar, ShinyText, ArrowRight } = window;

      return (
        <section className="relative h-screen w-full overflow-hidden bg-black">
          {/* Background video */}
          <video
            className="absolute inset-0 w-full h-full object-cover z-0"
            src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260328_105406_16f4600d-7a92-4292-b96e-b19156c7830a.mp4"
            autoPlay
            loop
            muted
            playsInline
          />
          {/* Subtle overlay for legibility */}
          <div className="absolute inset-0 z-0 bg-gradient-to-b from-black/40 via-black/10 to-black/50"></div>

          {/* Content */}
          <div className="relative z-10 max-w-7xl mx-auto px-6 h-full flex flex-col pb-10">
            <Navbar />

            {/* Top two-column section */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-10">
              <p className="text-white/80 text-sm md:text-base max-w-md leading-relaxed">
                We deliver transformative programs that empower emerging product designers with
                cutting-edge expertise and vision to thrive globally.
              </p>
              <p className="text-white/80 text-sm md:text-base lg:text-right lg:justify-self-end max-w-md leading-relaxed">
                8000+ Talented Designers Launched !
              </p>
            </div>

            {/* Center hero */}
            <div className="flex-1 flex flex-col items-center justify-center text-center">
              <p className="uppercase text-white/80 text-xs md:text-sm tracking-tight mb-5">
                Seats for Next Program Opening Soon
              </p>

              <h1 className="text-white font-medium tracking-tighter text-5xl sm:text-6xl md:text-7xl lg:text-8xl xl:text-9xl"
                  style={{ lineHeight: 0.85 }}>
                <span className="block">Become</span>
                <span className="block">
                  <ShinyText text="Product Leader." />
                </span>
              </h1>

              <a href="https://t.me/MizoJobRoBot" target="_blank" rel="noopener"
                 className="group mt-10 inline-flex items-center gap-2 bg-black hover:bg-gray-900 text-white rounded-full px-6 md:px-8 py-3 md:py-4 text-sm md:text-base font-medium transition-colors">
                Apply for Next Enrollment
                <ArrowRight className="h-4 w-4 transition-transform duration-300 group-hover:translate-x-1" />
              </a>
            </div>
          </div>
        </section>
      );
    }
    window.Hero = Hero;
  </script>

  <!-- ===== App + mount ===== -->
  <script type="text/babel">
    function App() {
      const { Hero } = window;
      return <Hero />;
    }
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
